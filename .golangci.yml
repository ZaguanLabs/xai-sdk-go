version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gosec
    - gocyclo
    - gocritic
    - revive
  settings:
    gocyclo:
      min-complexity: 15
    govet:
      enable:
        - shadow
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
  exclusions:
    rules:
    # Exclude some linters from running on tests files
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - gosec
    # Exclude known issues in generated code
      - path: proto/gen/
        linters:
          - all
    # Exclude context.Background() warnings in internal setup code
      - path: xai/client\.go
        text: "context.Background"
        linters:
          - staticcheck
    # Exclude example-only diagnostics from CI package linting
      - path: examples/
        linters:
          - errcheck
          - gocritic
          - gosec
          - govet
          - unparam
    # Context cancellation is intentionally owned by returned contexts/streams
      - path: xai/client\.go
        text: "G118:"
        linters:
          - gosec
      - path: xai/internal/grpcutil/timeout\.go
        text: "G118:"
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports

output:
  formats:
    text:
      path: stdout
      colors: true
      print-issued-lines: true
      print-linter-name: true
